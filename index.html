 <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --text: #eef0f8;
      --text-muted: #7c82a8;
      --accent: #e8c547;
      --cat-depart: #3ecf8e;
      --cat-parcours: #4a9eff;
      --cat-arrivee: #ef5b5b;
      --menu-h: 52px;
      --panel-h: 260px;
      --header-h: 48px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'tahoma', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
      z-index: 100;
    }
    header h1 {
      font-family: 'tahoma', sans-serif;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .legend { display: flex; gap: 10px; }
    .legend-item {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--text-muted);
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #map { flex: 1; width: 100%; z-index: 1; }
    #panel {
      height: var(--panel-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0; z-index: 100;
    }
    .tabs {
      display: flex; height: var(--menu-h);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .tab-btn {
      flex: 1; background: none; border: none;
      color: var(--text-muted);
      font-family: 'tahoma', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; position: relative; transition: color 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .tab-btn::after {
      content: ''; position: absolute;
      bottom: 0; left: 20%; right: 20%;
      height: 2px; border-radius: 2px 2px 0 0;
      background: transparent; transition: background 0.2s;
    }
    .tab-btn.active { color: var(--text); }
    .tab-btn.active::after { background: var(--accent); }
    .tab-dot { width: 7px; height: 7px; border-radius: 50%; }
    .tab-content {
      display: none; overflow-y: auto; flex: 1;
      padding: 6px 8px; gap: 4px; flex-direction: column;
    }
    .tab-content.active { display: flex; }
    .stand-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      background: var(--surface2); border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s; flex-shrink: 0;
    }
    .stand-item:hover { border-color: var(--border); }
    .stand-item.active { border-color: var(--accent); background: #22263a; }
    .stand-badge {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'tahoma', sans-serif; font-size: 10px; font-weight: 800;
      color: #fff; flex-shrink: 0;
    }
    .stand-info { flex: 1; min-width: 0; }
    .stand-name {
      font-family: 'tahoma', sans-serif; font-size: 12px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .stand-desc {
      font-size: 10px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
    }
    .stand-num {
      font-family: 'tahoma', sans-serif; font-size: 10px;
      font-weight: 600; color: var(--text-muted); flex-shrink: 0;
    }
    .stand-popup {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      min-width: 160px; max-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .stand-popup-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .stand-popup-badge {
      width: 24px; height: 24px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'tahoma', sans-serif; font-size: 9px; font-weight: 800;
      color: #fff; flex-shrink: 0;
    }
    .stand-popup-name { font-family: 'tahoma', sans-serif; font-size: 12px; font-weight: 700; line-height: 1.2; }
    .stand-popup-cat { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .stand-popup-desc { font-size: 10px; color: var(--text-muted); line-height: 1.4; }
    .leaflet-container { background: #1a1d27; }
    .leaflet-control-zoom { border: 1px solid var(--border) !important; border-radius: 8px !important; overflow: hidden; }
    .leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-bottom: 1px solid var(--border) !important; }
    .leaflet-control-zoom a:hover { background: var(--surface2) !important; }
    .leaflet-control-attribution { display: none; }
    .leaflet-popup-content-wrapper { background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none !important; }
    .leaflet-popup { bottom: 14px !important; }
    .user-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); border: 2px solid #fff;
      box-shadow: 0 0 0 4px rgba(232,197,71,0.3);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(232,197,71,0.3); }
      50%       { box-shadow: 0 0 0 8px rgba(232,197,71,0.08); }
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

// ═══════════════════════════════════════
//  COULEURS
// ═══════════════════════════════════════
const COLORS = {
  depart:   '#3ecf8e',
  parcours: '#4a9eff',
  arrivee:  '#ef5b5b',
};
const CAT_LABELS = {
  depart:   'Village départ',
  parcours: 'Parcours',
  arrivee:  "Village d'arrivée",
};

// ═══════════════════════════════════════
//  CARTE
// ═══════════════════════════════════════
const map = L.map('map', {
  center: CENTER,
  zoom: 13,
  zoomControl: true,
  maxBounds: [
    [CENTER[0] - 0.045, CENTER[1] - 0.060],
    [CENTER[0] + 0.045, CENTER[1] + 0.060],
  ],
  maxBoundsViscosity: 0.9,
  minZoom: 13,
  maxZoom: 19,
});

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '',
  maxZoom: 19,
}).addTo(map);

// ── Tracés GPX ──
L.polyline(GPX_DEPOSE_BUS, { color: '#3ecf8e', weight: 3, opacity: 0.85, dashArray: '6,4' }).addTo(map);
L.polyline(GPX_MONTEE,     { color: '#e8c547', weight: 4, opacity: 0.9 }).addTo(map);
L.polyline(GPX_ACCES_BUS,  { color: '#ef5b5b', weight: 3, opacity: 0.85, dashArray: '6,4' }).addTo(map);

// ── Géolocalisation utilisateur ──
const userIcon = L.divIcon({
  className: '',
  html: '<div class="user-dot"></div>',
  iconSize: [14, 14],
  iconAnchor: [7, 7],
});

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    if (!window._userMarker) {
      window._userMarker = L.marker(ll, { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
    } else {
      window._userMarker.setLatLng(ll);
    }
  }, null, { enableHighAccuracy: true });
}

// ═══════════════════════════════════════
//  MARQUEURS STANDS
// ═══════════════════════════════════════
const markers = {};
let activePopup = null;
let activeStandId = null;

function makeStandIcon(stand, isActive) {
  const color = COLORS[stand.categorie];
  const border = isActive ? '#e8c547' : '#fff';
  const size = isActive ? 34 : 28;
  const fs = isActive ? 10 : 9;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px;height:${size}px;
      background:${color};
      border:2px solid ${border};
      border-radius:${size/2}px ${size/2}px ${size/2}px 2px;
      display:flex;align-items:center;justify-content:center;
      font-family:'tahoma',sans-serif;font-size:${fs}px;font-weight:800;
      color:#fff;
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
    ">${stand.id}</div>`,
    iconSize: [size, size],
    iconAnchor: [size / 2, size],
    popupAnchor: [0, -(size + 8)],
  });
}

function openStandPopup(stand) {
  const color = COLORS[stand.categorie];
  if (activePopup) { map.closePopup(activePopup); }

  document.querySelectorAll('.stand-item').forEach(el => el.classList.remove('active'));
  const li = document.getElementById('li-' + stand.id);
  if (li) {
    li.classList.add('active');
    const currentTab = document.querySelector('.tab-content.active');
    if (!currentTab || currentTab.id !== 'tab-' + stand.categorie) {
      switchTab(stand.categorie);
    }
    setTimeout(() => li.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 100);
  }

  if (activeStandId && markers[activeStandId]) {
    const prev = stands.find(s => s.id === activeStandId);
    if (prev) markers[prev.id].setIcon(makeStandIcon(prev, false));
  }
  activeStandId = stand.id;
  markers[stand.id].setIcon(makeStandIcon(stand, true));

  const popupContent = `
    <div class="stand-popup">
      <div class="stand-popup-header">
        <div class="stand-popup-badge" style="background:${color}">${stand.id}</div>
        <div class="stand-popup-name">${stand.nom}</div>
      </div>
      <div class="stand-popup-cat" style="color:${color}">${CAT_LABELS[stand.categorie]}</div>
      <div class="stand-popup-desc">${stand.description}</div>
    </div>`;

  activePopup = L.popup({
    closeButton: false,
    autoClose: false,
    closeOnClick: false,
    className: 'custom-popup',
    offset: [0, -60],
    autoPan: true,
    autoPanPaddingTopLeft: [10, 60],
    autoPanPaddingBottomRight: [10, 280],
  })
    .setLatLng([stand.lat, stand.lng])
    .setContent(popupContent)
    .openOn(map);
}

stands.forEach(stand => {
  const marker = L.marker([stand.lat, stand.lng], {
    icon: makeStandIcon(stand, false),
  }).addTo(map);

  marker.on('click', () => {
    map.setView([stand.lat, stand.lng], Math.max(map.getZoom(), 17), { animate: true });
    setTimeout(() => openStandPopup(stand), 300);
  });

  markers[stand.id] = marker;
});

map.on('click', e => {
  if (!e.originalEvent.target.closest?.('.leaflet-marker-icon')) {
    if (activePopup) { map.closePopup(activePopup); activePopup = null; }
    if (activeStandId) {
      const prev = stands.find(s => s.id === activeStandId);
      if (prev) markers[prev.id].setIcon(makeStandIcon(prev, false));
      activeStandId = null;
    }
    document.querySelectorAll('.stand-item').forEach(el => el.classList.remove('active'));
  }
});

// ═══════════════════════════════════════
//  LISTE DES STANDS
// ═══════════════════════════════════════
['depart', 'parcours', 'arrivee'].forEach(cat => {
  const container = document.getElementById('tab-' + cat);
  stands.filter(s => s.categorie === cat).forEach(stand => {
    const color = COLORS[stand.categorie];
    const div = document.createElement('div');
    div.className = 'stand-item';
    div.id = 'li-' + stand.id;
    div.innerHTML = `
      <div class="stand-badge" style="background:${color}">${stand.id}</div>
      <div class="stand-info">
        <div class="stand-name">${stand.nom}</div>
        <div class="stand-desc">${stand.description}</div>
      </div>
      <div class="stand-num">#${stand.id}</div>`;
    div.addEventListener('click', () => {
      map.setView(CENTER, 13, { animate: true });
      setTimeout(() => {
        map.setView([stand.lat, stand.lng], 18, { animate: true });
        setTimeout(() => openStandPopup(stand), 500);
      }, 600);
    });
    container.appendChild(div);
  });
});

// ═══════════════════════════════════════
//  ONGLETS
// ═══════════════════════════════════════
function switchTab(cat) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + cat));
}
</script>
